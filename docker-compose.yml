version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: hr_agent_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-hr_agent}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hr_agent_pass}
      POSTGRES_DB: ${POSTGRES_DB:-hr_agent_db}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: hr_agent_redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
